name: CogniGraph Daily Sync

on:
  schedule:
    - cron: '0 2 * * *' # 매일 새벽 2시에 실행
  workflow_dispatch:   # 수동 실행 허용

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pipeline/requirements.txt ]; then
            pip install -r pipeline/requirements.txt
          else
            pip install sentence-transformers torch feedparser
          fi

      - name: Run Curation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python pipeline/fetch_data.py

      - name: Commit and Push changes
        run: |
          # 1. Git 사용자 설정
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 2. src/data/blog 경로에서 .md 파일 존재 여부 확인
          if ls src/data/blog/*.md 1> /dev/null 2>&1; then
            git add src/data/blog/*.md
            
            # 3. 실제 변경 사항이 있는지 확인
            if ! git diff --cached --quiet; then
              git commit -m "chore: auto-curate new research to data/blog [skip ci]"
              git push
            else
              echo "오늘 수집된 논문 중 새로 추가된 데이터가 없습니다."
            fi
          else
            echo "src/data/blog 폴더 내에 생성된 .md 파일이 없습니다."
          fi
