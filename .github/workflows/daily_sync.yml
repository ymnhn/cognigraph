name: CogniGraph Daily Sync

on:
  schedule:
    - cron: '0 2 * * *' # Runs at 2:00 AM every night
  workflow_dispatch:   # Allows you to run it manually for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install sentence-transformers torch
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
      - name: Run Curation Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }} # Add this line
        run: python pipeline/fetch_data.py
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Check if any .md files exist before trying to add them
          if ls src/content/blog/*.md 1> /dev/null 2>&1; then
            git add src/content/blog/*.md
            
            # Check for actual changes to avoid 'nothing to commit' error
            if ! git diff --cached --quiet; then
              git commit -m "Automated Curation: New research added"
              git push
            else
              echo "No new changes to commit today."
            fi
          else
            echo "No .md files found. Skipping commit step."
          fi
      - name: Save New Research to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/*.md
          git commit -m "chore: auto-curate new research" || echo "No new papers found"
          git push
