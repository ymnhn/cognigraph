name: Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: cognigraph
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser sentence-transformers torch deep-translator

      - name: Run pipeline
        run: python fetch.py

      - name: Commit new papers
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if ls src/data/*.md 1>/dev/null 2>&1; then
            git add src/data/*.md
            if ! git diff --cached --quiet; then
              git commit -m "chore: add papers"
              git pull --rebase
              git push
            fi
          fi
